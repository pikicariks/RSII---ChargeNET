services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: chargenet-sqlserver
    environment:
      SA_PASSWORD: 'Passw0rd!'
      ACCEPT_EULA: 'Y'
      MSSQL_PID: 'Developer'
    ports:
      - '1433:1433'
    volumes:
      - sqlserver-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Passw0rd!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: chargenet-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - '5672:5672'
      - '15672:15672'
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  webapi:
    build:
      context: .
      dockerfile: ChargeNet.WebAPI/Dockerfile
    container_name: chargenet-webapi
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__ChargeNetDb: Server=sqlserver,1433;Database=ChargeNet;User Id=sa;Password=Passw0rd!;TrustServerCertificate=true
      Jwt__Key: ChargeNET-SuperSecret-Key-At-Least-32-Characters-Long!!
      Jwt__Issuer: ChargeNet
      Jwt__Audience: ChargeNetUsers
      Jwt__TokenExpiryMinutes: "60"
      Stripe__SecretKey: ${STRIPE_SECRET_KEY:-}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET:-}
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
    ports:
      - '5000:8080'
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: ChargeNet.Worker/Dockerfile
    container_name: chargenet-worker
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ConnectionStrings__ChargeNetDb: Server=sqlserver,1433;Database=ChargeNet;User Id=sa;Password=Passw0rd!;TrustServerCertificate=true
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
    restart: unless-stopped

volumes:
  sqlserver-data:
