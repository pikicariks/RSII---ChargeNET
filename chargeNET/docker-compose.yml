services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: chargenet-sqlserver
    environment:
      SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      ACCEPT_EULA: 'Y'
      MSSQL_PID: ${MSSQL_PID:-Developer}
    ports:
      - '1433:1433'
    volumes:
      - sqlserver-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: chargenet-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - '5672:5672'
      - '15672:15672'
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  webapi:
    build:
      context: .
      dockerfile: ChargeNet.WebAPI/Dockerfile
    container_name: chargenet-webapi
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__ChargeNetDb: ${CHARGENET_CONNECTION_STRING}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER:-ChargeNet}
      Jwt__Audience: ${JWT_AUDIENCE:-ChargeNetUsers}
      Jwt__TokenExpiryMinutes: ${JWT_EXPIRY_MINUTES:-60}
      Stripe__SecretKey: ${STRIPE_SECRET_KEY:-}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET:-}
      RabbitMQ__Host: ${RABBITMQ_HOST:-rabbitmq}
      RabbitMQ__Port: ${RABBITMQ_PORT:-5672}
      RabbitMQ__Username: ${RABBITMQ_USERNAME}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
    ports:
      - '5000:8080'
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: ChargeNet.Worker/Dockerfile
    container_name: chargenet-worker
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ConnectionStrings__ChargeNetDb: ${CHARGENET_CONNECTION_STRING}
      RabbitMQ__Host: ${RABBITMQ_HOST:-rabbitmq}
      RabbitMQ__Port: ${RABBITMQ_PORT:-5672}
      RabbitMQ__Username: ${RABBITMQ_USERNAME}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
    restart: unless-stopped

volumes:
  sqlserver-data:
